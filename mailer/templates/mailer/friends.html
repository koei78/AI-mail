<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="csrf-token" content="{{ csrf_token }}">
<title>友達 — はやメール</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0078d4;--blue-hover:#106ebe;--blue-light:#deecf9;--blue-bg:#eff6fc;
  --sidebar-bg:#faf9f8;--sidebar-w:200px;
  --border:#edebe9;--text:#201f1e;--text-sub:#605e5c;--text-light:#a19f9d;
  --hover:#f3f2f1;--shadow:0 3.2px 7.2px rgba(0,0,0,.13),0 .6px 1.8px rgba(0,0,0,.1);
  --radius:4px;--hdr-h:48px;
  --friends-w:280px;
  --sent-bg:#dcf8c6;--recv-bg:#fff;
  --chat-bg:#e5ddd5;--chat-header:#075e54;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;font-size:13px;color:var(--text);background:#fff}

.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:700;color:#fff;flex-shrink:0;user-select:none}

/* ===== アプリ全体 ===== */
#app{display:flex;flex-direction:column;height:100vh}

/* ===== トップバー ===== */
#topbar{
  height:var(--hdr-h);background:#fff;border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px 0 0;
  flex-shrink:0;z-index:20;
}
.tb-logo-wrap{
  width:var(--sidebar-w);height:100%;
  display:flex;align-items:center;padding:0 12px;gap:6px;
  border-right:1px solid var(--border);flex-shrink:0;
}
.tb-logo{height:24px;display:block}
.tb-title{flex:1;padding:0 16px;font-size:.9rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.tb-spacer{flex:1}
.tb-account-btn{
  display:flex;align-items:center;gap:8px;
  border:none;background:transparent;cursor:pointer;
  padding:4px 8px;border-radius:var(--radius);
  transition:background .12s;margin-left:4px;
}
.tb-account-btn:hover{background:var(--hover)}
.tb-account-email{font-size:.78rem;color:var(--text-sub);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ===== サイドバー ===== */
#sidebar{width:var(--sidebar-w);background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sb-new-btn{display:flex;align-items:center;gap:6px;margin:8px 10px 6px;padding:6px 12px;border:none;border-radius:var(--radius);color:#fff;font-size:.82rem;font-weight:600;background:var(--blue);cursor:pointer;transition:background .12s;text-decoration:none}
.sb-new-btn:hover{background:var(--blue-hover)}
.sb-new-btn svg{flex-shrink:0}
.sb-active-item{display:flex;align-items:center;gap:7px;margin:0 10px 4px;padding:7px 12px;border-radius:var(--radius);background:var(--blue-light);border:1px solid #b3d6f5;color:var(--blue);font-size:.8rem;font-weight:700}
.sb-section-label{padding:8px 14px 3px;font-size:.68rem;font-weight:600;color:var(--text-light);letter-spacing:.05em;text-transform:uppercase}
.folder-item{display:flex;align-items:center;gap:8px;margin:0 10px;padding:6px 10px 6px 14px;cursor:pointer;border-radius:0;transition:background .1s;border-left:3px solid transparent;text-decoration:none;color:var(--text)}
.folder-item:hover{background:var(--hover)}
.fi-icon{width:20px;text-align:center;flex-shrink:0}
.folder-name{flex:1;font-size:.82rem}
.folder-badge{background:var(--blue);color:#fff;border-radius:10px;padding:1px 6px;font-size:.7rem;font-weight:700;min-width:18px;text-align:center}
.folder-badge.zero{display:none}
.sb-footer{margin-top:auto;padding:8px 12px;border-top:1px solid var(--border)}
.sb-settings-btn,.sb-sync-btn{display:flex;align-items:center;gap:8px;width:100%;background:transparent;border:none;padding:8px 10px;border-radius:var(--radius);font-size:.82rem;color:var(--text-sub);cursor:pointer;transition:background .12s}
.sb-settings-btn{margin-bottom:2px}
.sb-settings-btn:hover,.sb-sync-btn:hover{background:var(--hover)}

/* ===== メインエリア ===== */
#main{display:flex;flex:1;overflow:hidden}

/* ===== 友達パネル ===== */
#friends-panel{
  width:var(--friends-w);flex-shrink:0;
  display:flex;flex-direction:column;
  border-right:1px solid var(--border);background:#f7f8fa;
  overflow:hidden;
}
#friends-list{
  flex:1;overflow-y:auto;
}
#friends-header{
  padding:10px 14px 8px;border-bottom:1px solid var(--border);
  background:#fff;flex-shrink:0;
}
#friends-header-row{display:flex;align-items:center;justify-content:space-between}
#friends-header-row h2{font-size:.9rem;font-weight:700;color:var(--text)}
#add-toggle-btn{
  display:flex;align-items:center;gap:4px;
  padding:5px 10px;border:none;border-radius:20px;
  background:#107c10;color:#fff;font-size:.75rem;font-weight:600;cursor:pointer;
  transition:background .12s;
}
#add-toggle-btn:hover{background:#0d6b0d}
#add-toggle-btn.open{background:#d13438}
#add-friend-form{
  overflow:hidden;max-height:0;
  transition:max-height .25s ease,opacity .2s ease;
  opacity:0;padding-top:0;
}
#add-friend-form.open{max-height:120px;opacity:1;padding-top:8px}
.af-row{display:flex;gap:5px;margin-top:5px}
.af-row:first-child{margin-top:0}
.af-row input{
  flex:1;border:1px solid var(--border);border-radius:var(--radius);
  padding:6px 8px;font-size:.8rem;outline:none;background:#fff;
}
.af-row input:focus{border-color:var(--blue)}
.af-submit{
  padding:6px 12px;background:var(--blue);color:#fff;border:none;
  border-radius:var(--radius);font-size:.75rem;font-weight:600;cursor:pointer;
  white-space:nowrap;transition:background .12s;
}
.af-submit:hover{background:var(--blue-hover)}

/* 友達リスト */
#friends-list{flex:1;overflow-y:auto}
#friends-list::-webkit-scrollbar{width:4px}
#friends-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#friends-empty{padding:32px 16px;text-align:center;color:var(--text-light);font-size:.85rem}
.friend-item{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--border);
  transition:background .1s;position:relative;background:#fff;
  border-left:3px solid transparent;
}
.friend-item:hover{background:#f0f4f8}
.friend-item.active{background:var(--blue-bg);border-left-color:var(--blue)}
.friend-av{width:44px;height:44px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:#fff}
.friend-info{flex:1;min-width:0}
.friend-name{font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.friend-email{font-size:.72rem;color:var(--text-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.friend-last-msg{font-size:.72rem;color:var(--text-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px}
.friend-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.friend-time{font-size:.68rem;color:var(--text-light);white-space:nowrap}
.friend-del{
  position:absolute;right:6px;top:6px;
  width:20px;height:20px;border:none;background:transparent;
  color:var(--text-light);cursor:pointer;border-radius:50%;
  display:none;align-items:center;justify-content:center;font-size:.85rem;
}
.friend-item:hover .friend-del{display:flex}
.friend-del:hover{background:#fde7e9;color:#d32f2f}

/* ===== スレッドエリア（常時表示） ===== */
#thread-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--chat-bg)}

/* 空状態 */
#thread-empty{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;color:var(--text-light);background:var(--chat-bg);
}
#thread-empty .te-icon{font-size:3.5rem;opacity:.35}
#thread-empty .te-text{font-size:1rem;font-weight:500}
#thread-empty .te-sub{font-size:.82rem}

/* ローディング */
#thread-loading{
  display:none;flex:1;align-items:center;justify-content:center;
  gap:10px;color:var(--text-light);font-size:.88rem;background:var(--chat-bg);
}
.spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(0,0,0,.15);border-top-color:var(--chat-header);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* スレッドヘッダー */
#thread-header{
  display:none;align-items:center;gap:10px;
  padding:10px 16px;background:var(--chat-header);color:#fff;flex-shrink:0;
}
#th-avatar{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700}
#th-info{flex:1;min-width:0}
#th-name{font-size:.92rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#th-email{font-size:.72rem;opacity:.82;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.th-btn{
  display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--radius);
  background:rgba(255,255,255,.18);color:#fff;font-size:.78rem;font-weight:600;
  text-decoration:none;border:none;cursor:pointer;transition:background .12s;white-space:nowrap;
}
.th-btn:hover{background:rgba(255,255,255,.3)}

/* ===== メッセージエリア ===== */
#messages-wrap{
  display:none;         /* JS で flex に切替 */
  flex:1;
  overflow-y:auto;
  padding:12px 16px;
  gap:6px;
}
#messages-wrap::-webkit-scrollbar{width:5px}
#messages-wrap::-webkit-scrollbar-thumb{background:rgba(0,0,0,.2);border-radius:3px}

/* 1行 = 1メッセージ、左右に振り分け */
.msg-row{
  display:flex;
  align-items:flex-end;
  gap:7px;
  width:100%;
}
/* 受信：アバター＋バブルを左に */
.msg-row.received{
  flex-direction:row;
  justify-content:flex-start;
}
/* 送信：バブルを右に */
.msg-row.sent{
  flex-direction:row-reverse;
  justify-content:flex-start;
}

/* アバター（受信のみ） */
.msg-av{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:700;color:#fff;
}

/* バブル */
.msg-bubble{
  max-width:70%;
  padding:9px 13px;
  word-break:break-word;
  box-shadow:0 1px 2px rgba(0,0,0,.12);
}
/* 受信：白・左上角なし */
.msg-row.received .msg-bubble{
  background:#fff;
  border-radius:0 14px 14px 14px;
}
/* 送信：緑・右上角なし */
.msg-row.sent .msg-bubble{
  background:var(--sent-bg);
  border-radius:14px 0 14px 14px;
}

.msg-subject{
  font-size:.78rem;font-weight:700;color:var(--text);
  margin-bottom:5px;padding-bottom:5px;
  border-bottom:1px solid rgba(0,0,0,.07);line-height:1.3;
}
.msg-body{
  font-size:.79rem;color:var(--text-sub);
  line-height:1.7;white-space:pre-wrap;
  margin-bottom:5px;max-height:280px;overflow-y:auto;
}
.msg-body.loading{color:var(--text-light);font-style:italic}
.msg-foot{
  display:flex;align-items:center;justify-content:flex-end;
  gap:5px;margin-top:3px;
}
.msg-time{font-size:.62rem;color:var(--text-light);white-space:nowrap}
.msg-open-link{
  font-size:.67rem;color:var(--blue);text-decoration:none;
  display:block;margin-top:4px;opacity:.7;
}
.msg-open-link:hover{opacity:1;text-decoration:underline}
.date-sep{
  text-align:center;
  font-size:.68rem;color:var(--text-light);
  margin:8px 0;
}

/* 返信バー */
#reply-bar{
  display:none;align-items:flex-end;gap:8px;
  padding:8px 12px;background:#f0f0f0;border-top:1px solid #ddd;flex-shrink:0;
}
#reply-input{
  flex:1;border:none;border-radius:22px;padding:9px 14px;
  font-size:.85rem;outline:none;resize:none;background:#fff;
  font-family:inherit;max-height:120px;overflow-y:auto;line-height:1.4;
}
.reply-send-btn{
  width:40px;height:40px;border-radius:50%;background:var(--chat-header);border:none;
  color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .12s;
}
.reply-send-btn:hover{background:#128c7e}

/* アカウントドロップダウン */
#account-dropdown{display:none;position:fixed;top:52px;right:12px;background:#fff;border:1px solid var(--border);border-radius:6px;box-shadow:var(--shadow);z-index:300;min-width:220px;overflow:hidden}

/* トースト */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#323130;color:#fff;padding:10px 22px;border-radius:20px;font-size:.82rem;opacity:0;pointer-events:none;transition:opacity .2s;z-index:400;white-space:nowrap}
#toast.show{opacity:1}
#toast.ok{background:#388e3c}
#toast.err{background:#d32f2f}

/* PC では戻るボタン非表示 */
#back-btn{ display:none }

/* ===== ボトムナビ ===== */
#bottom-nav{
  display:none;   /* PCでは非表示 */
}
@media(max-width:700px){
  #bottom-nav{
    display:flex;
    position:fixed;bottom:0;left:0;right:0;
    height:56px;background:#fff;
    border-top:1px solid var(--border);
    z-index:200;
    align-items:stretch;
  }
  #app{ padding-bottom:56px; }
}
.bnav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;border:none;background:transparent;cursor:pointer;
  color:var(--text-light);font-size:.6rem;font-weight:600;
  text-decoration:none;padding:4px 0;transition:color .12s;
}
.bnav-item svg{ flex-shrink:0 }
.bnav-item.active{ color:var(--blue) }
.bnav-item:active{ opacity:.7 }

/* ===== モバイル ===== */
@media(max-width:700px){
  /* サイドバー・ロゴ帯を隠す */
  #sidebar{ display:none }
  .tb-logo-wrap{ display:none }
  .tb-title{ padding-left:12px }

  /* メインを縦積みにする */
  #main{ position:relative; overflow:hidden }

  /* 友達リストを全幅で表示 */
  #friends-panel{
    position:absolute; inset:0;
    width:100%; z-index:10;
    transform:translateX(0);
    transition:transform .22s ease;
  }

  /* スレッドを右にオフスクリーン */
  #thread-area{
    position:absolute; inset:0;
    width:100%; z-index:10;
    transform:translateX(100%);
    transition:transform .22s ease;
    display:flex!important;   /* 常にflexで、オフスクリーンで隠す */
  }

  /* 友達選択時：リストを左に退場、スレッドを表示 */
  #friends-panel.chat-open{ transform:translateX(-100%) }
  #thread-area.chat-open{   transform:translateX(0) }

  /* スレッドヘッダーの戻るボタンを表示 */
  #back-btn{ display:flex!important }

  /* 友達リストのスクロール */
  #friends-list{ overflow-y:auto }

  /* バブルの最大幅を広げる */
  .msg-bubble{ max-width:85% }
}
</style>
</head>
<body>
<div id="app">

<!-- トップバー -->
<div id="topbar">
  <div class="tb-logo-wrap">
    <img src="/static/img/logo.png" alt="はやメール" class="tb-logo">
  </div>
  <div class="tb-title">
    <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    友達
  </div>
  <div class="tb-spacer"></div>
  <button class="tb-account-btn" id="account-toggle-btn">
    <div class="avatar" id="account-avatar" style="background:#0078d4;width:28px;height:28px;font-size:.7rem">U</div>
    <div class="tb-account-email" id="account-email-label">アカウント</div>
    <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
  </button>
</div>

<!-- アカウントドロップダウン -->
<div id="account-dropdown">
  <div style="padding:10px 16px;border-bottom:1px solid var(--border);font-size:.75rem;color:var(--text-light);font-weight:600;text-transform:uppercase;letter-spacing:.05em">アカウント切替</div>
  <div id="account-list-dropdown"></div>
</div>

<!-- メインエリア -->
<div id="main">

  <!-- サイドバー -->
  <div id="sidebar">
    <a class="sb-new-btn" href="/mail/?auto_action=compose">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      新規メール
    </a>
    <a href="/mail/classify/" style="display:flex;align-items:center;gap:6px;margin:0 10px 4px;padding:5px 12px;border-radius:4px;border:1px solid #b3d6f5;color:#0078d4;font-size:.78rem;font-weight:500;text-decoration:none;width:calc(100% - 20px);box-sizing:border-box;transition:background .12s" onmouseover="this.style.background='#e8f4fd'" onmouseout="this.style.background=''">
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      分類リストを開く
    </a>
    <div class="sb-active-item">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      友達
    </div>
    <div class="sb-section-label">フォルダ</div>
    <div id="folder-list"><div style="padding:12px 16px;font-size:.82rem;color:var(--text-light)">読み込み中…</div></div>
    <div class="sb-section-label" style="margin-top:6px">ラベル</div>
    <div id="label-list"></div>
    <div class="sb-footer">
      <div id="sb-account-name" style="font-size:.72rem;color:var(--text-light);padding:2px 10px 6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></div>
      <button class="sb-settings-btn" onclick="location.href='/mail/'">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        設定
      </button>
      <button class="sb-sync-btn" id="btn-sync" onclick="syncFolders()">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        今すぐ同期
      </button>
    </div>
  </div>

  <!-- 友達パネル（常時表示） -->
  <div id="friends-panel">
    <div id="friends-header">
      <div id="friends-header-row">
        <h2>友達リスト</h2>
        <button id="add-toggle-btn" onclick="toggleAddForm()">
          <svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          友達を追加
        </button>
      </div>
      <div id="add-friend-form">
        <div class="af-row"><input type="text" id="add-name" placeholder="表示名（省略可）"></div>

<script>
const CSRF = document.querySelector('meta[name="csrf-token"]').content;
const ACCOUNTS = {{ accounts_json|safe }};
const _savedId = localStorage.getItem('selectedAccountId');
let ACCOUNT_ID = (_savedId && ACCOUNTS.find(a => a.id === parseInt(_savedId)))
  ? parseInt(_savedId) : (ACCOUNTS[0]?.id || null);

let currentFriendEmail = null;
let _friends = [];

// ===== ユーティリティ =====
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function avatarInitial(s){ return s ? s[0].toUpperCase() : '?' }
function avatarColor(s){
  const c=['#25d366','#0078d4','#d13438','#ca5010','#8764b8','#038387','#107c10'];
  let h=0; for(let i=0;i<(s||'').length;i++) h=(h*31+s.charCodeAt(i))&0xffffffff;
  return c[Math.abs(h)%c.length];
}
function toast(msg, type=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='show'+(type?' '+type:'');
  clearTimeout(el._t); el._t=setTimeout(()=>el.className='',3500);
}
function relativeTime(isoStr){
  if(!isoStr) return '';
  const d=new Date(isoStr), now=new Date();
  const diff=(now-d)/1000;
  if(diff<60) return 'たった今';
  if(diff<3600) return Math.floor(diff/60)+'分前';
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const yesterday=new Date(today.getTime()-86400000);
  if(d>=today) return d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  if(d>=yesterday) return '昨日';
  if(d.getFullYear()===now.getFullYear()) return (d.getMonth()+1)+'/'+(d.getDate());
  return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate();
}
function formatDate(isoStr){
  if(!isoStr) return '';
  const d=new Date(isoStr);
  return d.toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function dateSeparator(isoStr){
  if(!isoStr) return '';
  const d=new Date(isoStr), now=new Date();
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const yesterday=new Date(today.getTime()-86400000);
  if(d>=today) return '今日';
  if(d>=yesterday) return '昨日';
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
}

// ===== アカウント =====
function renderAccountDropdown(){
  document.getElementById('account-list-dropdown').innerHTML = ACCOUNTS.map(a=>`
    <div onclick="selectAccount(${a.id})" style="display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:.88rem;transition:background .1s" onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background=''">

      <span>${esc(a.email_address)}</span>
    </div>`).join('');
}
const FOLDER_ICONS={
  inbox:`<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M22 12h-6l-2 3H10l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>`,
  sent:`<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`,
  draft:`<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>`,
  trash:`<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>`,
  spam:`<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
  custom:`<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`,
};

async function loadFolders(){
  if(!ACCOUNT_ID) return;
  const res=await fetch('/mail/api/folders/?account_id='+ACCOUNT_ID);
  const data=await res.json();
  if(!data.ok) return;
  const el=document.getElementById('folder-list');
  if(!data.folders.length){ el.innerHTML='<div style="padding:12px 16px;font-size:.82rem;color:var(--text-light)">フォルダなし</div>'; return; }
  el.innerHTML=data.folders.map(f=>`
    <a class="folder-item" href="/mail/?folder_id=${f.id}">
      <span class="fi-icon">${FOLDER_ICONS[f.folder_type]||FOLDER_ICONS.custom}</span>
      <span class="folder-name">${esc(f.name)}</span>
      <span class="folder-badge${f.unread_count===0?' zero':''}">${f.unread_count}</span>
    </a>`).join('');
}

async function loadLabels(){
  if(!ACCOUNT_ID) return;
  try {
    const res=await fetch('/mail/api/labels/?account_id='+ACCOUNT_ID);
    const data=await res.json();
    if(!data.ok) return;
    const el=document.getElementById('label-list');
    if(!data.labels||!data.labels.length){ el.innerHTML='<div style="padding:4px 14px 6px;font-size:.75rem;color:var(--text-light)">ラベルなし</div>'; return; }
    el.innerHTML=data.labels.map(l=>`
      <a class="folder-item" href="/mail/?label_id=${l.id}" style="border-left-color:${esc(l.color||'#ccc')}">
        <span class="fi-icon" style="color:${esc(l.color||'#888')}">●</span>
        <span class="folder-name">${esc(l.name)}</span>
      </a>`).join('');
  } catch(e){}
}

async function syncFolders(){
  if(!ACCOUNT_ID) return;
  const btn=document.getElementById('btn-sync');
  if(btn){ btn.disabled=true; btn.style.opacity='.5'; }
  try {
    await fetch(`/mail/api/accounts/${ACCOUNT_ID}/sync/`, {method:'POST', headers:{'X-CSRFToken':CSRF}});
    await loadFolders();
    toast('同期しました','ok');
  } catch(e){ toast('同期失敗','err'); }
  if(btn){ btn.disabled=false; btn.style.opacity=''; }
}

function selectAccount(id){
  const acc=ACCOUNTS.find(a=>a.id===id); if(!acc) return;
  ACCOUNT_ID=acc.id;
  localStorage.setItem('selectedAccountId', String(acc.id));
  document.getElementById('account-avatar').textContent=acc.email_address[0].toUpperCase();
  document.getElementById('account-avatar').style.background=avatarColor(acc.email_address);
  document.getElementById('account-email-label').textContent=acc.email_address;
  document.getElementById('sb-account-name').textContent=acc.email_address;
  document.getElementById('account-dropdown').style.display='none';
  currentFriendEmail=null;
  showThreadEmpty();
  loadFolders();
  loadLabels();
  loadFriends();
}

// ===== 友達リスト =====
async function loadFriends(){
  if(!ACCOUNT_ID) return;
  const res=await fetch('/mail/api/friends/?account_id='+ACCOUNT_ID);
  const data=await res.json();
  if(!data.ok){ toast('友達リストの取得に失敗しました','err'); return; }
  _friends=data.friends;
  renderFriendList();
  // バックグラウンドでキャッシュから最新件名を更新
  syncFriendsLastMessage();
}

async function syncFriendsLastMessage(){
  if(!ACCOUNT_ID||!_friends.length) return;
  try {
    const res=await fetch('/mail/api/friends/sync/?account_id='+ACCOUNT_ID);
    const data=await res.json();
    if(data.ok && data.friends?.length){ _friends=data.friends; renderFriendList(); }
  } catch(e){}
}

function renderFriendList(){
  const list=document.getElementById('friends-list');
  const empty=document.getElementById('friends-empty');
  if(!_friends.length){ empty.style.display='block'; list.innerHTML=''; return; }
  empty.style.display='none';
  list.innerHTML=_friends.map(f=>{
    const name=f.display_name||f.email_address;
    const color=avatarColor(f.email_address);
    const isActive=f.email_address===currentFriendEmail;
    return `
    <div class="friend-item${isActive?' active':''}" onclick="selectFriend('${esc(f.email_address)}')">
      <div class="friend-av" style="background:${color}">${esc(avatarInitial(name))}</div>
      <div class="friend-info">
        <div class="friend-name">${esc(name)}</div>
        <div class="friend-email">${esc(f.email_address)}</div>
        <div class="friend-last-msg">${esc(f.last_email_subject||'（まだメールなし）')}</div>
      </div>
      <div class="friend-meta">
        <span class="friend-time">${esc(relativeTime(f.last_email_at))}</span>
      </div>
      <button class="friend-del" onclick="event.stopPropagation();removeFriend('${esc(f.email_address)}')" title="削除">✕</button>
    </div>`;
  }).join('');
}

function toggleAddForm(){
  const form=document.getElementById('add-friend-form');
  const btn=document.getElementById('add-toggle-btn');
  const isOpen=form.classList.contains('open');
  form.classList.toggle('open',!isOpen);
  btn.classList.toggle('open',!isOpen);

async function addFriend(){
  const email=(document.getElementById('add-email').value||'').trim();
  const name=(document.getElementById('add-name').value||'').trim();
  if(!email){ toast('メールアドレスを入力してください','err'); return; }
  const res=await fetch('/mail/api/friends/',{
    method:'POST',
    headers:{'X-CSRFToken':CSRF,'Content-Type':'application/json'},
    body:JSON.stringify({email,name,account_id:ACCOUNT_ID}),
  });
  const data=await res.json();
  if(!data.ok){ toast('追加失敗: '+(data.error||'不明'),'err'); return; }
  toast(data.created?email+'を追加しました':'既に友達です','ok');
  document.getElementById('add-email').value='';
  document.getElementById('add-name').value='';
  document.getElementById('add-friend-form').classList.remove('open');
  document.getElementById('add-toggle-btn').classList.remove('open');
  await loadFriends();
}

async function removeFriend(email){
  if(!confirm(email+'を削除しますか？')) return;
  const res=await fetch('/mail/api/friends/',{
    method:'DELETE',
    headers:{'X-CSRFToken':CSRF,'Content-Type':'application/json'},
    body:JSON.stringify({email,account_id:ACCOUNT_ID}),
  });
  const data=await res.json();
  if(!data.ok){ toast('削除失敗','err'); return; }
  toast('削除しました');
  if(currentFriendEmail===email){ currentFriendEmail=null; showThreadEmpty(); }
  await loadFriends();
}

function showThreadEmpty(){

  document.getElementById('thread-loading').style.display='none';
  document.getElementById('thread-header').style.display='none';
  document.getElementById('messages-wrap').style.cssText='display:none';

function showThreadLoading(){

  document.getElementById('thread-loading').style.display='flex';
  document.getElementById('thread-header').style.display='none';

const _isMobile=()=>window.innerWidth<=700;

// モバイル：友達リストに戻る
function closeChatMobile(){
  stopPolling();
  document.getElementById('friends-panel').classList.remove('chat-open');
  document.getElementById('thread-area').classList.remove('chat-open');
  currentFriendEmail=null;
  renderFriendList();
  showThreadEmpty();
}

async function selectFriend(email){
  if(currentFriendEmail===email) return;
  stopPolling();
  currentFriendEmail=email;
  renderFriendList();

  // モバイル: スレッドをスライドイン
  if(_isMobile()){
    document.getElementById('friends-panel').classList.add('chat-open');
    document.getElementById('thread-area').classList.add('chat-open');
  }

  const friend=_friends.find(f=>f.email_address===email);
  const name=friend?(friend.display_name||friend.email_address):email;
  const color=avatarColor(email);

  document.getElementById('th-avatar').textContent=avatarInitial(name);
  document.getElementById('th-avatar').style.background=color;
  document.getElementById('th-name').textContent=name;
  document.getElementById('th-email').textContent=email;
  document.getElementById('th-reply-btn').href=`/mail/?auto_action=compose&to=${encodeURIComponent(email)}`;

  showThreadLoading();

  try {
    const url=`/mail/api/friends/messages/?email=${encodeURIComponent(email)}`+(ACCOUNT_ID?`&account_id=${ACCOUNT_ID}`:'');
    const res=await fetch(url);
    const data=await res.json();
    if(!data.ok){ toast('メール取得失敗: '+(data.error||'不明'),'err'); showThreadEmpty(); return; }

    document.getElementById('thread-loading').style.display='none';
    document.getElementById('thread-header').style.display='flex';
    const mw=document.getElementById('messages-wrap');
    mw.style.cssText='display:flex;flex-direction:column;';
    document.getElementById('reply-bar').style.display='flex';

    renderMessages(data.messages, email, name, color);
    startPolling();  // 20秒ごとに差分チェック開始

    // 友達リストの最終メール時刻を反映
    if(data.messages?.length){
      const msgs=data.messages.filter(m=>m.received_at);
      if(msgs.length){
        const last=msgs[msgs.length-1];
        const f=_friends.find(f=>f.email_address===email);
        if(f){ f.last_email_at=last.received_at; f.last_email_subject=last.subject||''; renderFriendList(); }
      }
    }
  } catch(e){
    toast('通信エラー: '+e.message,'err');
    showThreadEmpty();
  }
}

const _bodyCache={};

function renderMessages(messages, friendEmail, friendName, friendColor){
  const wrap=document.getElementById('messages-wrap');
  if(!messages.length){
    wrap.innerHTML='<div style="text-align:center;color:var(--text-light);font-size:.85rem;margin-top:60px">'+esc(friendName)+'さんとのメールはまだありません</div>';
    wrap.scrollTop=wrap.scrollHeight;
    return;
  }

  // 日時昇順（古い=上、新しい=下）
  const sorted=[...messages].sort((a,b)=>{
    const ta=a.received_at?new Date(a.received_at).getTime():Infinity;
    const tb=b.received_at?new Date(b.received_at).getTime():Infinity;
    return ta-tb;
  });

  let lastSep='';
  const rows=[];
  sorted.forEach(m=>{
    const isSent=m.direction==='sent';
    const sep=dateSeparator(m.received_at||'');
    if(sep&&sep!==lastSep){
      rows.push('<div class="date-sep">'+esc(sep)+'</div>');
      lastSep=sep;
    }
    const av=isSent?'':'<div class="msg-av" style="background:'+friendColor+'">'+esc(avatarInitial(friendName))+'</div>';
    const link=m.folder_id?'<a class="msg-open-link" href="/mail/?auto_open_uid='+m.uid+'&auto_open_folder='+m.folder_id+'">メールで開く →</a>':'';
    rows.push(
      '<div class="msg-row '+(isSent?'sent':'received')+'">'+
        av+
        '<div class="msg-bubble">'+
          '<div class="msg-subject">'+esc(m.subject||'（件名なし）')+'</div>'+
          '<div class="msg-body loading" id="body-'+m.uid+'">読み込み中…</div>'+
          '<div class="msg-foot">'+
            '<span class="msg-time">'+esc(formatDate(m.received_at||''))+'</span>'+
          '</div>'+
          link+
        '</div>'+
      '</div>'
    );
  });
  _shownUids.clear();
  sorted.forEach(m=>_shownUids.add(m.uid));
  wrap.innerHTML=rows.join('');
  wrap.scrollTop=wrap.scrollHeight;

  loadBodiesAsync(sorted);
}

async function loadBodiesAsync(messages){
  // DBキャッシュ済みはすぐ反映、未取得のみIMAPフェッチ（直列・最大5件）
  const uncached=[];
  for(const m of messages){
    const el=document.getElementById('body-'+m.uid);
    if(!el) continue;
    if(_bodyCache[m.uid]!==undefined){
      el.textContent=_bodyCache[m.uid]||'（本文なし）'; el.classList.remove('loading'); continue;
    }
    // サーバーがすでに本文を返している場合（body_cached=True）
    if(m.body_text!=null||m.body_html!=null){
      const raw=(m.body_text||m.body_html||'').trim();
      const body=raw.length>1500?raw.slice(0,1500)+'…':raw||'（本文なし）';
      _bodyCache[m.uid]=body; el.textContent=body; el.classList.remove('loading'); continue;
    }
    if(!m.folder_id){ el.textContent='（本文なし）'; el.classList.remove('loading'); continue; }
    uncached.push(m);
  }
  // 未キャッシュ分は直列で取得（並列IMAP接続を避ける）
  for(const m of uncached){
    const el=document.getElementById('body-'+m.uid);
    if(!el) continue;
    try{
      const res=await fetch(`/mail/api/emails/${m.uid}/?folder_id=${m.folder_id}`);
      const data=await res.json();
      if(data.ok){
        const raw=(data.email?.body_text||data.email?.body_html||'').trim();
        const body=raw.length>1500?raw.slice(0,1500)+'…':raw||'（本文なし）';
        _bodyCache[m.uid]=body;
        if(el){ el.textContent=body; el.classList.remove('loading'); }
      } else {
        _bodyCache[m.uid]=''; if(el){ el.textContent='（取得失敗）'; el.classList.remove('loading'); }
      }
    }catch(e){
      if(el){ el.textContent='（通信エラー）'; el.classList.remove('loading'); }
    }
  }
}

// ===== リアルタイム更新 =====
const _shownUids = new Set();   // 表示済みUID
let _pollTimer = null;
let _lastFriendEmail = null;

// 既存チャットに新規バブルだけ追記する
function appendMessage(m, friendName, friendColor){
  if(_shownUids.has(m.uid)) return;
  _shownUids.add(m.uid);
  const wrap = document.getElementById('messages-wrap');
  const isSent = m.direction==='sent';
  const av = isSent ? '' : '<div class="msg-av" style="background:'+friendColor+'">'+esc(avatarInitial(friendName))+'</div>';
  const link = m.folder_id ? '<a class="msg-open-link" href="/mail/?auto_open_uid='+m.uid+'&auto_open_folder='+m.folder_id+'">メールで開く →</a>' : '';
  const div = document.createElement('div');
  div.className = 'msg-row '+(isSent?'sent':'received');
  div.innerHTML =
    av+
    '<div class="msg-bubble">'+
      '<div class="msg-subject">'+esc(m.subject||'（件名なし）')+'</div>'+
      '<div class="msg-body loading" id="body-'+m.uid+'">読み込み中…</div>'+
      '<div class="msg-foot"><span class="msg-time">'+esc(formatDate(m.received_at||''))+'</span></div>'+
      link+
    '</div>';
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  // 本文表示（DBキャッシュ優先、なければIMAP）
  const bodyEl=document.getElementById('body-'+m.uid);
  if(bodyEl){
    if(_bodyCache[m.uid]!==undefined){
      bodyEl.textContent=_bodyCache[m.uid]||'（本文なし）'; bodyEl.classList.remove('loading');
    } else if(m.body_text!=null||m.body_html!=null){
      const raw=(m.body_text||m.body_html||'').trim();
      const body=raw.length>1500?raw.slice(0,1500)+'…':raw||'（本文なし）';
      _bodyCache[m.uid]=body; bodyEl.textContent=body; bodyEl.classList.remove('loading');
    } else if(m.folder_id){
      fetch('/mail/api/emails/'+m.uid+'/?folder_id='+m.folder_id)
        .then(r=>r.json()).then(d=>{
          const el=document.getElementById('body-'+m.uid);
          if(!el) return;
          if(d.ok){
            const raw=(d.email?.body_text||d.email?.body_html||'').trim();
            const body=raw.length>1500?raw.slice(0,1500)+'…':raw||'（本文なし）';
            _bodyCache[m.uid]=body; el.textContent=body; el.classList.remove('loading');
          } else { el.textContent='（取得失敗）'; el.classList.remove('loading'); }
        }).catch(()=>{
          const el=document.getElementById('body-'+m.uid);
          if(el){ el.textContent='（通信エラー）'; el.classList.remove('loading'); }
        });
    }
  }
}

// 差分ポーリング（新着だけ追記）
async function pollMessages(){
  if(!currentFriendEmail || !ACCOUNT_ID) return;
  try{
    const url='/mail/api/friends/messages/?email='+encodeURIComponent(currentFriendEmail)+'&account_id='+ACCOUNT_ID;
    const res=await fetch(url);
    const data=await res.json();
    if(!data.ok) return;
    const friend=_friends.find(f=>f.email_address===currentFriendEmail);
    const name=friend?(friend.display_name||friend.email_address):currentFriendEmail;
    const color=avatarColor(currentFriendEmail);
    // 日時昇順で並べて新着だけ追記
    const sorted=[...data.messages].sort((a,b)=>{
      const ta=a.received_at?new Date(a.received_at).getTime():Infinity;
      const tb=b.received_at?new Date(b.received_at).getTime():Infinity;
      return ta-tb;
    });
    sorted.forEach(m=>appendMessage(m, name, color));
  }catch(e){}
}

function startPolling(){
  stopPolling();
  _pollTimer=setInterval(pollMessages, 20000); // 20秒ごとに差分チェック
}
function stopPolling(){
  if(_pollTimer){ clearInterval(_pollTimer); _pollTimer=null; }
}

// ===== 返信 =====
async function sendReply(){
  const bodyText=(document.getElementById('reply-input').value||'').trim();
  if(!bodyText){ toast('本文を入力してください','err'); return; }
  if(!currentFriendEmail) return;
  const friend=_friends.find(f=>f.email_address===currentFriendEmail);
  const name=friend?(friend.display_name||friend.email_address):currentFriendEmail;
  const subj='Re: '+(friend?.last_email_subject||'');

  // ── 即時プレビューバブルを追加 ──
  const nowIso=new Date().toISOString();
  const tmpUid='tmp-'+Date.now();
  const wrap=document.getElementById('messages-wrap');
  const div=document.createElement('div');
  div.className='msg-row sent';
  div.id='tmp-'+tmpUid;
  div.innerHTML=
    '<div class="msg-bubble" style="opacity:.6">'+
      '<div class="msg-subject">'+esc(subj)+'</div>'+
      '<div class="msg-body">'+esc(bodyText)+'</div>'+
      '<div class="msg-foot"><span class="msg-time">送信中…</span></div>'+
    '</div>';
  wrap.appendChild(div);
  wrap.scrollTop=wrap.scrollHeight;

  document.getElementById('reply-input').value='';
  document.getElementById('reply-input').style.height='auto';

  try {
    const res=await fetch('/mail/api/send/',{
      method:'POST',
      headers:{'X-CSRFToken':CSRF,'Content-Type':'application/json'},
      body:JSON.stringify({account_id:ACCOUNT_ID,to:[currentFriendEmail],subject:subj,body:bodyText}),
    });
    const data=await res.json();
    if(data.ok){
      // プレビューバブルを確定表示に更新
      const foot=div.querySelector('.msg-foot');
      if(foot) foot.innerHTML='<span class="msg-time">'+esc(formatDate(nowIso))+'</span>';
      div.querySelector('.msg-bubble').style.opacity='1';
      toast('送信しました','ok');
      // キャッシュ更新後に差分ポーリングで本物のバブルと差し替え（重複はUID管理で防ぐ）
    } else {
      div.remove();
      toast('送信失敗: '+(data.error||'不明'),'err');
      document.getElementById('reply-input').value=bodyText;
    }
  } catch(e){
    div.remove();
    toast('通信エラー: '+e.message,'err');
    document.getElementById('reply-input').value=bodyText;
  }
}
