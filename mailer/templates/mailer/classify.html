<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="csrf-token" content="{{ csrf_token }}">
<title>AI メール分類 — はやメール</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0078d4;
  --blue-hover:#106ebe;
  --blue-light:#deecf9;
  --blue-bg:#eff6fc;
  --sidebar-bg:#faf9f8;
  --sidebar-w:200px;
  --border:#edebe9;
  --text:#201f1e;
  --text-sub:#605e5c;
  --text-light:#a19f9d;
  --hover:#f3f2f1;
  --active:#edebe9;
  --shadow:0 3.2px 7.2px rgba(0,0,0,.13),0 .6px 1.8px rgba(0,0,0,.1);
  --radius:4px;
  --hdr-h:40px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;font-size:13px;color:var(--text);background:#fff}

/* ===== アバター ===== */
.avatar{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:600;color:#fff;flex-shrink:0;user-select:none;
}

/* ===== レイアウト ===== */
#app{display:flex;flex-direction:column;height:100vh}

/* ===== トップバー ===== */
#topbar{
  height:var(--hdr-h);background:#fff;border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px 0 0;
  flex-shrink:0;z-index:20;
}
.tb-logo{
  width:var(--sidebar-w);height:100%;
  display:flex;align-items:center;padding:0 12px;gap:6px;
  border-right:1px solid var(--border);flex-shrink:0;
}
.tb-logo img{height:24px;display:block}
.tb-title{
  flex:1;padding:0 16px;font-size:.9rem;font-weight:700;color:var(--text);
  display:flex;align-items:center;gap:6px;
}
.tb-spacer{flex:1}
.tb-right{display:flex;align-items:center;gap:4px}
.tb-account-btn{
  display:flex;align-items:center;gap:8px;
  border:none;background:transparent;cursor:pointer;padding:4px 8px;
  border-radius:var(--radius);transition:background .12s;margin-left:4px;
}
.tb-account-btn:hover{background:var(--hover)}
.tb-account-email{font-size:.78rem;color:var(--text-sub);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ===== メインエリア ===== */
#main{display:flex;flex:1;overflow:hidden}

/* ===== サイドバー ===== */
#sidebar{
  width:var(--sidebar-w);background:var(--sidebar-bg);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;
}
.sb-back-btn{
  display:flex;align-items:center;gap:6px;
  margin:8px 10px 6px;padding:6px 12px;
  border:none;border-radius:var(--radius);color:white;font-size:.82rem;font-weight:600;
  background:var(--blue);cursor:pointer;transition:background .12s;text-decoration:none;
}
.sb-back-btn:hover{background:var(--blue-hover)}
.sb-classify-active{
  display:flex;align-items:center;gap:7px;
  margin:0 10px 4px;padding:7px 12px;border-radius:var(--radius);
  background:var(--blue-light);border:1px solid #b3d6f5;color:var(--blue);
  font-size:.8rem;font-weight:700;width:calc(100% - 20px);
}
.sb-section-label{
  padding:8px 14px 3px;font-size:.68rem;font-weight:600;
  color:var(--text-light);letter-spacing:.05em;text-transform:uppercase;
}
.folder-item{
  margin:10px 10px;display:flex;align-items:center;gap:8px;
  padding:6px 10px 6px 14px;cursor:pointer;
  border-radius:0;transition:background .1s;user-select:none;
  border-left:3px solid transparent;text-decoration:none;color:var(--text);
}
.folder-item:hover{background:var(--hover)}
.fi-icon{width:20px;text-align:center;flex-shrink:0}
.fi-icon svg{display:block;margin:auto}
.folder-name{flex:1;font-size:.82rem}
.folder-badge{
  background:var(--blue);color:#fff;border-radius:10px;
  padding:1px 6px;font-size:.7rem;font-weight:700;min-width:18px;text-align:center;
}
.folder-badge.zero{display:none}
.sb-footer{
  margin-top:auto;padding:8px 12px;border-top:1px solid var(--border);
}

/* ===== コンテンツエリア ===== */
#content{
  flex:1;overflow-y:auto;background:#f0f2f5;padding:20px;
}

/* ===== カード ===== */
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}
.card-header{
  display:flex;align-items:center;padding:12px 16px;
  border-bottom:1px solid var(--border);gap:10px;
}
.card-title{font-size:.95rem;font-weight:700;flex:1}
.btn-classify{
  display:flex;align-items:center;gap:6px;
  background:var(--blue);color:#fff;border:none;
  padding:7px 16px;border-radius:var(--radius);
  font-size:.82rem;font-weight:600;cursor:pointer;transition:opacity .15s;
}
.btn-classify:hover{opacity:.88}
.btn-classify:disabled{opacity:.5;cursor:not-allowed}
.btn-reset{
  display:flex;align-items:center;gap:5px;background:transparent;
  border:1px solid #bdbdbd;color:#757575;padding:6px 12px;
  border-radius:var(--radius);font-size:.82rem;cursor:pointer;
}
.btn-reset:hover{background:var(--hover)}

/* ===== スピナー ===== */
.spinner{
  display:inline-block;width:14px;height:14px;
  border:2px solid var(--border);border-top-color:var(--blue);
  border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== テーブル ===== */
.tbl-wrap{overflow-x:hidden}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead tr{background:#f5f5f5}
thead th{
  padding:9px 14px;text-align:left;font-size:.78rem;font-weight:700;
  color:#424242;white-space:nowrap;border-bottom:2px solid var(--border);
  cursor:pointer;user-select:none;
}
thead th:hover{background:var(--active)}
thead th .sort-icon{margin-left:4px;opacity:.5;font-size:.72rem}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
tbody tr:hover{background:var(--blue-bg)}
tbody tr:last-child{border-bottom:none}
tbody td{padding:10px 14px;font-size:.85rem;vertical-align:middle;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* 列幅（合計100%、colgroup の class は c- prefix で div class と分離） */
col.c-title  {width:30%}
col.c-sender {width:20%}
col.c-summary{width:26%}
col.c-cat    {width:10%}
col.c-action {width:14%}

/* ===== バッジ ===== */
.badge{
  display:inline-flex;align-items:center;justify-content:center;
  padding:3px 10px;border-radius:12px;font-size:.72rem;font-weight:700;
  white-space:nowrap;letter-spacing:.03em;
}
.badge-A{background:#f44336;color:#fff}
.badge-B{background:#ff9800;color:#fff}
.badge-C{background:#4caf50;color:#fff}

/* ===== 行カラー ===== */
tbody tr.row-A{border-left:4px solid #f44336;background:#fff8f8}
tbody tr.row-B{border-left:4px solid #ff9800;background:#fffbf0}
tbody tr.row-C{border-left:4px solid #4caf50;background:#f6fbf6}
tbody tr.row-A:hover{background:#ffeaea}
tbody tr.row-B:hover{background:#fff3d6}
tbody tr.row-C:hover{background:#e8f5e9}

/* ===== 件名セルのみ太字 ===== */
td.td-title{font-weight:600}
td.td-sender{color:var(--text-sub)}
td.td-summary{color:var(--text-sub);font-size:.8rem}
td.td-action{text-align:center;overflow:visible}
.reply-btn{
  display:inline-flex;align-items:center;gap:4px;
  background:transparent;border:1px solid var(--blue);color:var(--blue);
  padding:3px 9px;border-radius:var(--radius);font-size:.75rem;font-weight:600;
  cursor:pointer;text-decoration:none;white-space:nowrap;transition:background .12s;
}
.reply-btn:hover{background:var(--blue-bg)}

/* ===== 行展開（詳細パネル） ===== */
tbody tr{transition:background .15s}
.row-expand-cell{
  padding:0 14px !important;
  overflow:hidden;
}
.row-expand-inner{
  max-height:0;overflow:hidden;
  transition:max-height .35s ease, padding .35s ease, opacity .25s ease;
  opacity:0;padding:0;
}
tr.expanded .row-expand-inner{
  max-height:200px;
  opacity:1;
  padding:10px 0 12px;
}
.expand-summary{
  font-size:.85rem;line-height:1.7;color:var(--text);
  word-break:break-all;white-space:pre-wrap;
}
.expand-meta{
  display:flex;gap:16px;margin-top:8px;font-size:.78rem;color:var(--text-sub);
}
.expand-meta span{display:flex;align-items:center;gap:4px}

/* ===== フィルターバー ===== */
#filter-bar{
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;border-bottom:1px solid var(--border);background:#fafafa;
}
#filter-bar .filter-label{font-size:.78rem;color:var(--text-light);margin-right:2px}
.filter-pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600;
  border:1px solid var(--border);background:#fff;cursor:pointer;
  transition:background .12s,border-color .12s,color .12s;color:var(--text-sub);
}
.filter-pill:hover{background:var(--hover)}
.filter-pill.active-all{background:var(--blue);color:#fff;border-color:var(--blue)}
.filter-pill.active-A{background:#f44336;color:#fff;border-color:#f44336}
.filter-pill.active-B{background:#ff9800;color:#fff;border-color:#ff9800}
.filter-pill.active-C{background:#4caf50;color:#fff;border-color:#4caf50}
#filter-count{font-size:.78rem;color:var(--text-light);margin-left:auto}

/* ===== 空状態 ===== */
#empty-msg{text-align:center;padding:48px 16px;color:var(--text-sub)}
.empty-icon{font-size:2rem;display:block;margin-bottom:8px}

/* ===== フッター ===== */
.card-footer{
  display:flex;align-items:center;justify-content:flex-end;
  padding:8px 16px;border-top:1px solid var(--border);
  font-size:.8rem;color:var(--text-sub);
}

/* ===== スケジュールカード ===== */
#schedule-panel{padding:14px 16px;background:#fafafa}

/* ===== トースト ===== */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#323130;color:#fff;padding:10px 22px;border-radius:20px;
  font-size:.82rem;opacity:0;pointer-events:none;transition:opacity .2s;z-index:200;white-space:nowrap;
}
#toast.show{opacity:1}
#toast.err{background:#d32f2f}
#toast.ok{background:#388e3c}

/* ===== アカウントドロップダウン ===== */
#account-dropdown{
  display:none;position:fixed;top:44px;right:12px;
  background:#fff;border:1px solid var(--border);border-radius:6px;
  box-shadow:var(--shadow);z-index:200;min-width:220px;overflow:hidden;
}
</style>
</head>
<body>
<div id="app">

<!-- ===== トップバー ===== -->
<div id="topbar">
  <div class="tb-logo">
    <img src="/static/img/logo.png" alt="はやメール">
  </div>
  <div class="tb-title">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    AI メール分類
  </div>
  <div class="tb-spacer"></div>
  <div class="tb-right">
    <button class="tb-account-btn" id="account-toggle-btn">
      <div class="avatar" id="account-avatar" style="background:#0078d4;width:28px;height:28px;font-size:.7rem">U</div>
      <div class="tb-account-email" id="account-email-label">アカウント</div>
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
    </button>
  </div>
</div>

<!-- ===== アカウントドロップダウン ===== -->
<div id="account-dropdown">
  <div style="padding:10px 16px;border-bottom:1px solid var(--border);font-size:.75rem;color:var(--text-light);font-weight:600;text-transform:uppercase;letter-spacing:.05em">アカウント切替</div>
  <div id="account-list-dropdown"></div>
  <div style="border-top:1px solid var(--border)">
    <a href="/mail/setup/" style="display:flex;align-items:center;gap:8px;padding:10px 16px;font-size:.85rem;color:var(--blue);text-decoration:none;transition:background .12s" onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background=''">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      アカウントを追加
    </a>
  </div>
</div>

<!-- ===== メインエリア ===== -->
<div id="main">

  <!-- ===== サイドバー ===== -->
  <div id="sidebar">
    <a class="sb-back-btn" href="/mail/">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      受信トレイへ戻る
    </a>
    <div class="sb-classify-active">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      AI メール分類
    </div>
    <div class="sb-section-label">フォルダ</div>
    <div id="folder-list">
      <div style="padding:10px 16px;font-size:.8rem;color:var(--text-light)">読み込み中…</div>
    </div>
    <div class="sb-footer">
      <div style="font-size:.75rem;color:var(--text-light);text-align:center" id="sb-account-name"></div>
    </div>
  </div>

  <!-- ===== コンテンツ ===== -->
  <div id="content">

    <!-- 分類カード -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">メール優先度リスト</span>
        <button class="btn-reset" id="btn-reset" title="分類結果をリセットして再分類">
          <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/></svg>
          リセット
        </button>
        <button class="btn-classify" id="btn-classify">
          <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          カテゴリ分類開始
        </button>
      </div>

      <!-- フィルターバー -->
      <div id="filter-bar">
        <span class="filter-label">絞り込み:</span>
        <button class="filter-pill active-all" data-filter="all" onclick="setFilter('all')">すべて</button>
        <button class="filter-pill" data-filter="A" onclick="setFilter('A')">
          <span style="width:8px;height:8px;border-radius:50%;background:#f44336;display:inline-block"></span>
          緊急 (A)
        </button>
        <button class="filter-pill" data-filter="B" onclick="setFilter('B')">
          <span style="width:8px;height:8px;border-radius:50%;background:#ff9800;display:inline-block"></span>
          重要 (B)
        </button>
        <button class="filter-pill" data-filter="C" onclick="setFilter('C')">
          <span style="width:8px;height:8px;border-radius:50%;background:#4caf50;display:inline-block"></span>
          通常 (C)
        </button>
        <span id="filter-count"></span>
      </div>

      <!-- テーブル -->
      <div class="tbl-wrap">
        <table id="mail-table">
          <colgroup>
            <col class="c-title">
            <col class="c-sender">
            <col class="c-summary">
            <col class="c-cat">
            <col class="c-action">
          </colgroup>
          <thead>
            <tr>
              <th data-col="title">件名 <span class="sort-icon">↕</span></th>
              <th data-col="sender">送信者 <span class="sort-icon">↕</span></th>
              <th data-col="summary">要約</th>
              <th data-col="category">カテゴリ <span class="sort-icon">↓</span></th>
              <th class="col-action">操作</th>
            </tr>
          </thead>
          <tbody id="mail-tbody">
            <tr id="loading-row" style="display:none">
              <td colspan="5" style="text-align:center;padding:32px;color:var(--text-sub)">
                <span class="spinner"></span>AIが分析中です…
              </td>
            </tr>
            <tr id="empty-row" style="display:none">
              <td colspan="5">
                <div id="empty-msg">
                  <span class="empty-icon">📭</span>
                  まだ分類結果がありません。「カテゴリ分類開始」を押してください。
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="card-footer">
        <span id="footer-count"></span>
      </div>
    </div>

    <!-- スケジュールカード -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">⏰ 自動仕分けスケジュール</span>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" id="sch-enabled" style="width:15px;height:15px;accent-color:var(--blue)">
          <span id="sch-toggle-label" style="font-size:.82rem;font-weight:600;color:#757575">無効</span>
        </label>
      </div>
      <div id="schedule-panel">
        <div id="sch-settings" style="display:none">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px">
            <span style="font-size:.82rem;color:#616161">実行時刻:</span>
            <select id="sch-hour" style="padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius);font-size:.85rem;background:#fff"></select>
            <span style="font-size:.9rem;font-weight:700">:</span>
            <select id="sch-minute" style="padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius);font-size:.85rem;background:#fff"></select>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">
            <span style="font-size:.82rem;color:#616161">曜日:</span>
            <label style="display:flex;align-items:center;gap:3px;cursor:pointer;font-size:.82rem">
              <input type="checkbox" id="sch-wd-all-chk" style="accent-color:var(--blue)"> 毎日
            </label>
            <span id="sch-wd-chips"></span>
          </div>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <button id="btn-sch-save" style="background:var(--blue);color:#fff;border:none;padding:7px 16px;border-radius:var(--radius);font-size:.82rem;font-weight:600;cursor:pointer">保存</button>
            <span id="sch-status" style="font-size:.8rem;color:#757575"></span>
          </div>
        </div>
        <div id="sch-info" style="display:none;margin-top:8px;font-size:.8rem;color:#757575;display:flex;gap:20px;flex-wrap:wrap">
          <span>次回実行: <strong id="sch-next-run">-</strong></span>
          <span>最終実行: <strong id="sch-last-run">-</strong></span>
        </div>
      </div>
    </div>

  </div><!-- /content -->
</div><!-- /main -->
</div><!-- /app -->

<div id="toast"></div>

<script>
const CSRF = document.querySelector('meta[name="csrf-token"]').content;
const ACCOUNTS = {{ accounts_json|safe }};
const params = new URLSearchParams(location.search);
let ACCOUNT_ID = params.get('account_id') ? parseInt(params.get('account_id')) : (ACCOUNTS[0] ? ACCOUNTS[0].id : null);

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function classifyApiUrl() {
  return '/mail/api/classify/' + (ACCOUNT_ID ? '?account_id=' + ACCOUNT_ID : '');
}

function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type === 'error' ? ' err' : type === 'success' ? ' ok' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 3500);
}

// =============================================
// アバター
// =============================================
function avatarInitial(email) {
  return email ? email[0].toUpperCase() : '?';
}
function avatarColor(email) {
  const colors = ['#0078d4','#107c10','#d13438','#ca5010','#8764b8','#038387'];
  let h = 0;
  for (let i = 0; i < (email||'').length; i++) h = (h * 31 + email.charCodeAt(i)) & 0xffffffff;
  return colors[Math.abs(h) % colors.length];
}

// =============================================
// アカウント切替
// =============================================
function setAccount(acc) {
  ACCOUNT_ID = acc.id;
  document.getElementById('account-avatar').textContent = avatarInitial(acc.email_address);
  document.getElementById('account-avatar').style.background = avatarColor(acc.email_address);
  document.getElementById('account-email-label').textContent = acc.email_address;
  document.getElementById('sb-account-name').textContent = acc.email_address;
  history.replaceState(null, '', '/mail/classify/?account_id=' + acc.id);
  loadFolders();
  loadClassifications();
}

function renderAccountDropdown() {
  document.getElementById('account-list-dropdown').innerHTML = ACCOUNTS.map(a => `
    <div onclick="selectAccount(${a.id})" style="display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:.88rem;transition:background .1s" onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background=''">
      <div class="avatar" style="background:${avatarColor(a.email_address)};width:28px;height:28px;font-size:.7rem">${avatarInitial(a.email_address)}</div>
      <span>${esc(a.email_address)}</span>
    </div>
  `).join('');
}

function selectAccount(id) {
  const acc = ACCOUNTS.find(a => a.id === id);
  if (acc) { setAccount(acc); document.getElementById('account-dropdown').style.display = 'none'; }
}

document.getElementById('account-toggle-btn').addEventListener('click', e => {
  e.stopPropagation();
  const d = document.getElementById('account-dropdown');
  d.style.display = d.style.display === 'none' ? 'block' : 'none';
});
document.addEventListener('click', () => { document.getElementById('account-dropdown').style.display = 'none'; });

async function loadFolders() {
  if (!ACCOUNT_ID) return;
  const res = await fetch('/mail/api/folders/?account_id=' + ACCOUNT_ID);
  const data = await res.json();
  if (!data.ok) return;
  const el = document.getElementById('folder-list');
  if (!data.folders.length) { el.innerHTML = '<div style="padding:10px 16px;font-size:.8rem;color:var(--text-light)">フォルダなし</div>'; return; }
  el.innerHTML = data.folders.map(f => `
    <a class="folder-item" href="/mail/?folder_id=${f.id}">
      <span class="fi-icon">${FOLDER_ICONS[f.folder_type] || FOLDER_ICONS.custom}</span>
      <span class="folder-name">${esc(f.name)}</span>
      <span class="folder-badge${f.unread_count === 0 ? ' zero' : ''}">${f.unread_count}</span>
    </a>
  `).join('');
}

}

// =============================================
// フィルター
// =============================================
let _currentFilter = 'all';

function setFilter(f) {
  _currentFilter = f;
  // ボタンのアクティブ状態更新
  document.querySelectorAll('.filter-pill').forEach(btn => {
    btn.className = 'filter-pill';
    if (btn.dataset.filter === f) btn.classList.add('active-' + f);
  });
  applyFilter();
}

function applyFilter() {
  const tbody = document.getElementById('mail-tbody');
  const allRows = Array.from(tbody.querySelectorAll('tr[data-uid]:not([data-expand-for])'));
  let visibleCount = 0;
  allRows.forEach(tr => {
    const expandTr = tbody.querySelector(`tr[data-expand-for="${tr.dataset.uid}"]`);
    const show = _currentFilter === 'all' || tr.dataset.cat === _currentFilter;
    tr.style.display = show ? '' : 'none';
    if (expandTr) expandTr.style.display = show ? '' : 'none';
    if (show) visibleCount++;
  });
  const countEl = document.getElementById('filter-count');
  if (countEl) countEl.textContent = visibleCount + '件';
  // フッターも更新
  const footerCount = document.getElementById('footer-count');
  if (footerCount) {
    const total = allRows.length;
    footerCount.textContent = _currentFilter === 'all' ? total + '件' : `${visibleCount}件 / ${total}件`;
  }
}

// =============================================
// ソート
// =============================================
let _sortCol = 'category', _sortAsc = true;
document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (_sortCol === col) _sortAsc = !_sortAsc;
    else { _sortCol = col; _sortAsc = col !== 'category'; }
    document.querySelectorAll('thead th .sort-icon').forEach(ic => ic.textContent = '↕');
    th.querySelector('.sort-icon').textContent = _sortAsc ? '↓' : '↑';
    sortTable();
  });
});

function sortTable() {
  const tbody = document.getElementById('mail-tbody');
  const rows = Array.from(tbody.querySelectorAll('tr[data-uid]:not([data-expand-for])'));
  rows.sort((a, b) => {
    let va, vb;
    if (_sortCol === 'category') { va = a.dataset.cat; vb = b.dataset.cat; }
    else if (_sortCol === 'title') { va = a.querySelector('.td-title')?.textContent || ''; vb = b.querySelector('.td-title')?.textContent || ''; }
    else if (_sortCol === 'sender') { va = a.querySelector('.td-sender')?.textContent || ''; vb = b.querySelector('.td-sender')?.textContent || ''; }
    const cmp = va.localeCompare(vb, 'ja');
    return _sortAsc ? cmp : -cmp;
  });
  rows.forEach(r => tbody.appendChild(r));
}

// =============================================
// 分類一覧表示
// =============================================
function renderRows(items) {
  const tbody = document.getElementById('mail-tbody');
  tbody.querySelectorAll('tr[data-uid]').forEach(r => r.remove());
  const emptyRow = document.getElementById('empty-row');

  if (!items || !items.length) {
    emptyRow.style.display = '';
    document.getElementById('footer-count').textContent = '';
    return;
  }
  emptyRow.style.display = 'none';

  const sorted = [...items].sort((a, b) => a.category.localeCompare(b.category));
  sorted.forEach(c => {
    // メイン行
    const tr = document.createElement('tr');
    tr.dataset.uid = c.uid;
    tr.dataset.folder = c.folder_id;
    tr.dataset.cat = c.category;
    tr.className = 'row-' + c.category;
    tr.innerHTML = `
      <td class="td-title" title="${esc(c.subject)}">${esc(c.subject)||'(件名なし)'}</td>
      <td class="td-sender" title="${esc(c.sender)}">${esc(c.sender)||'(不明)'}</td>
      <td class="td-summary" title="${esc(c.summary)}">${esc(c.summary)||''}</td>
      <td><span class="badge badge-${esc(c.category)}">優先度:${esc(c.category)}</span></td>
      <td class="td-action" onclick="event.stopPropagation()">
        <a class="reply-btn" href="/mail/?auto_open_uid=${c.uid}&auto_open_folder=${c.folder_id}&auto_action=reply">
          <svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>返信
        </a>
      </td>`;

    // 展開行
    const expandTr = document.createElement('tr');
    expandTr.className = 'row-' + c.category;
    expandTr.dataset.expandFor = c.uid;
    expandTr.innerHTML = `
      <td class="row-expand-cell" colspan="5">
        <div class="row-expand-inner">
          <div class="expand-summary">${esc(c.summary)||'(要約なし)'}</div>
          <div class="expand-meta">
            <span>
              <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              ${esc(c.classified_at ? new Date(c.classified_at).toLocaleString('ja-JP') : '')}
            </span>
            <span>
              <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              ${esc(c.sender||'')}
            </span>
          </div>
        </div>
      </td>`;
    expandTr.addEventListener('click', () => window.location.href = `/mail/?auto_open_uid=${c.uid}&auto_open_folder=${c.folder_id}`);

    // 1秒ホバーで展開
    let _hoverTimer = null;
    const expand = () => {
      tr.classList.add('expanded');
      expandTr.classList.add('expanded');
    };
    const collapse = () => {
      tr.classList.remove('expanded');
      expandTr.classList.remove('expanded');
    };
    [tr, expandTr].forEach(el => {
      el.addEventListener('mouseenter', () => { _hoverTimer = setTimeout(expand, 1000); });
      el.addEventListener('mouseleave', () => { clearTimeout(_hoverTimer); collapse(); });
    });

    tr.addEventListener('click', () => window.location.href = `/mail/?auto_open_uid=${c.uid}&auto_open_folder=${c.folder_id}`);

    tbody.appendChild(tr);
    tbody.appendChild(expandTr);
  });
  applyFilter();
}


async function loadClassifications() {
  const res = await fetch(classifyApiUrl());
  const data = await res.json();
  if (data.ok) renderRows(data.classifications);
}
loadClassifications();

// =============================================
// リセット
// =============================================
document.getElementById('btn-reset').addEventListener('click', async () => {
  if (!confirm('分類結果をすべてリセットします。次回「分類開始」を押すと全メールを再分類します。よろしいですか？')) return;
  const res = await fetch(classifyApiUrl(), { method: 'DELETE', headers: { 'X-CSRFToken': CSRF } });
  const data = await res.json();
  if (data.ok) { renderRows([]); toast('リセットしました', 'success'); }
  else { toast('リセット失敗', 'error'); }
});

// =============================================
// 分類実行
// =============================================
document.getElementById('btn-classify').addEventListener('click', async () => {
  const btn = document.getElementById('btn-classify');
  const loadRow = document.getElementById('loading-row');
  btn.disabled = true;
  loadRow.style.display = 'table-row';
  toast('AIが分析中です…');

  try {
    const res = await fetch('/mail/api/classify/', {
      method: 'POST',
      headers: { 'X-CSRFToken': CSRF, 'Content-Type': 'application/json' },
      body: JSON.stringify(ACCOUNT_ID ? { account_id: ACCOUNT_ID } : {}),
    });
    const data = await res.json();
    if (!data.ok) { toast('分類失敗: ' + (data.error || '不明'), 'error'); return; }
    const errMsg = data.errors && data.errors.length ? '\n⚠️ ' + data.errors.join('\n⚠️ ') : '';
    toast(data.message + errMsg, data.errors && data.errors.length ? 'error' : 'success');
    const listRes = await fetch(classifyApiUrl());
    const listData = await listRes.json();
    if (listData.ok) renderRows(listData.classifications);
  } catch (e) {
    toast('通信エラー: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    loadRow.style.display = 'none';
  }
});

// =============================================
// スケジュール設定
// =============================================
const WD_LABELS = ['月', '火', '水', '木', '金', '土', '日'];

(function initSelects() {
  const hourSel = document.getElementById('sch-hour');
  const minSel = document.getElementById('sch-minute');
  for (let h = 0; h < 24; h++) {
    const opt = document.createElement('option');
    opt.value = h;
    opt.textContent = String(h).padStart(2, '0');
    hourSel.appendChild(opt);
  }
  for (let m = 0; m < 60; m++) {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = String(m).padStart(2, '0');
    minSel.appendChild(opt);
  }
})();

(function initWeekdays() {
  const wrap = document.getElementById('sch-wd-chips');
  WD_LABELS.forEach((label, idx) => {
    const lb = document.createElement('label');
    lb.style.cssText = 'display:inline-flex;align-items:center;gap:3px;cursor:pointer;font-size:.82rem;margin-left:6px';
    lb.innerHTML = `<input type="checkbox" class="sch-wd" value="${idx}" style="accent-color:var(--blue)"> ${label}`;
    wrap.appendChild(lb);
  });
})();

document.getElementById('sch-wd-all-chk').addEventListener('change', function () {
  document.querySelectorAll('.sch-wd').forEach(cb => { cb.checked = false; cb.disabled = this.checked; });
});

document.getElementById('sch-wd-chips').addEventListener('change', function () {
  const anyChecked = [...document.querySelectorAll('.sch-wd')].some(c => c.checked);
  document.getElementById('sch-wd-all-chk').checked = !anyChecked;
});

document.getElementById('sch-enabled').addEventListener('change', function () {
  document.getElementById('sch-settings').style.display = this.checked ? 'block' : 'none';
  document.getElementById('sch-toggle-label').textContent = this.checked ? '有効' : '無効';
  document.getElementById('sch-toggle-label').style.color = this.checked ? 'var(--blue)' : '#757575';
});

function applyScheduleToUI(sch) {
  const enabled = sch.is_enabled;
  document.getElementById('sch-enabled').checked = enabled;
  document.getElementById('sch-settings').style.display = enabled ? 'block' : 'none';
  document.getElementById('sch-toggle-label').textContent = enabled ? '有効' : '無効';
  document.getElementById('sch-toggle-label').style.color = enabled ? 'var(--blue)' : '#757575';
  document.getElementById('sch-hour').value = sch.hour;
  document.getElementById('sch-minute').value = sch.minute;

  const allChk = document.getElementById('sch-wd-all-chk');
  if (!sch.weekdays || sch.weekdays.length === 0) {
    allChk.checked = true;
    document.querySelectorAll('.sch-wd').forEach(cb => { cb.checked = false; cb.disabled = true; });
  } else {
    allChk.checked = false;
    document.querySelectorAll('.sch-wd').forEach(cb => {
      cb.checked = sch.weekdays.includes(parseInt(cb.value));
      cb.disabled = false;
    });
  }

  const infoEl = document.getElementById('sch-info');
  if (enabled) {
    infoEl.style.display = 'flex';
    document.getElementById('sch-next-run').textContent = sch.next_run_at ? new Date(sch.next_run_at).toLocaleString('ja-JP') : '-';
    document.getElementById('sch-last-run').textContent = sch.last_run_at ? new Date(sch.last_run_at).toLocaleString('ja-JP') : 'なし';
  } else {
    infoEl.style.display = 'none';
  }
}

async function loadSchedule() {
  try {
    const res = await fetch('/mail/api/classify/schedule/');
    const data = await res.json();
    if (data.ok) applyScheduleToUI(data.schedule);
  } catch (e) {
    console.warn('スケジュール取得失敗', e);
  }
}
loadSchedule();

document.getElementById('btn-sch-save').addEventListener('click', async () => {
  const isEnabled = document.getElementById('sch-enabled').checked;
  const hour = parseInt(document.getElementById('sch-hour').value);
  const minute = parseInt(document.getElementById('sch-minute').value);
  const allDay = document.getElementById('sch-wd-all-chk').checked;
  const weekdays = allDay ? [] : [...document.querySelectorAll('.sch-wd:checked')].map(cb => parseInt(cb.value));
  const statusEl = document.getElementById('sch-status');
  statusEl.textContent = '保存中...';
  try {
    const res = await fetch('/mail/api/classify/schedule/', {
      method: 'POST',
      headers: { 'X-CSRFToken': CSRF, 'Content-Type': 'application/json' },
      body: JSON.stringify({ is_enabled: isEnabled, hour, minute, weekdays }),
    });
    const data = await res.json();
    if (data.ok) {
      applyScheduleToUI(data.schedule);
      statusEl.textContent = '保存しました ✓';
      toast('スケジュールを保存しました', 'success');
      setTimeout(() => { statusEl.textContent = ''; }, 3000);
    } else {
      statusEl.textContent = 'エラー: ' + (data.error || '不明');
      toast('保存失敗', 'error');
    }
  } catch (e) {
    statusEl.textContent = '通信エラー';
    toast('通信エラー', 'error');
  }
});
</script>
