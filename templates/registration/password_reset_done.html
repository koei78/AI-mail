<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>はやメール — メール送信完了</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#0078d4;--indigo:#4f46e5;--text:#111827;--sub:#6b7280;--green:#059669}
body{
  font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;
  min-height:100vh;display:grid;grid-template-columns:1fr 1fr;background:#fff;
}
.left-panel{
  background:linear-gradient(145deg,#0f172a 0%,#1e1b4b 50%,#0c1a3d 100%);
  padding:48px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden;
}
.lp-glow{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.2),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.lp-tagline{font-size:clamp(1.6rem,2.5vw,2.2rem);font-weight:900;color:#fff;line-height:1.2;margin-bottom:16px;letter-spacing:-.03em;position:relative}
.lp-tagline .accent{color:#818cf8}
.lp-desc{font-size:.92rem;color:rgba(255,255,255,.55);line-height:1.75;max-width:380px;position:relative}
.lp-logo{display:flex;align-items:center;gap:10px;margin-bottom:48px;position:relative}
.right-panel{
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:48px 40px;background:#fff;
}
.card{width:100%;max-width:380px;text-align:center}
.icon{font-size:3rem;margin-bottom:16px}
.form-title{font-size:1.5rem;font-weight:900;letter-spacing:-.03em;margin-bottom:8px}
.form-sub{font-size:.9rem;color:var(--sub);margin-bottom:28px;line-height:1.7}
.info-box{background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:14px 18px;margin-bottom:24px;font-size:.85rem;color:#166534;line-height:1.6;text-align:left}
.btn{
  display:inline-block;padding:12px 28px;border-radius:9px;
  background:linear-gradient(135deg,var(--blue),var(--indigo));
  color:#fff;font-size:.95rem;font-weight:700;text-decoration:none;
  transition:opacity .15s;
}
.btn:hover{opacity:.9}
@media(max-width:768px){body{grid-template-columns:1fr}.left-panel{display:none}.right-panel{padding:40px 24px}}
</style>
</head>
<body>
<div class="left-panel">
  <div class="lp-glow"></div>
  <div class="lp-logo">
    <img src="/static/img/logo.png" alt="はやメール" style="height:48px;display:block">
  </div>
  <div class="lp-tagline">
    メールを<br>
    <span class="accent">送信しました。</span>
  </div>
  <p class="lp-desc">
    受信トレイをご確認ください。<br>
    メールが届かない場合は迷惑メールフォルダもご確認ください。
  </p>
</div>
<div class="right-panel">
  <div class="card">
    <div class="icon">📬</div>
    <div class="form-title">メールを送信しました</div>
    <div class="form-sub">
      入力されたメールアドレスにパスワードリセット用のリンクをお送りしました。
    </div>
    <div class="info-box">
      ✉️ <strong>support@hayamail.jp</strong> からメールが届きます。<br>
      リンクの有効期限は <strong>1時間</strong> です。<br>
      メールが届かない場合は迷惑メールフォルダをご確認ください。
    </div>
    <a href="/accounts/auth/" class="btn">ログインページへ戻る</a>
  </div>
</div>
</body>
</html>
